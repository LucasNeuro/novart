<!--
  Dashboard: Supabase → Authentication → Email Templates → template "Invite user"
  Assunto sugerido no campo Subject:
  Obra10+ — Convite para criar conta
-->
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Convite — Obra10+</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      width: 100% !important;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      background-color: #f7f9fb;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    "
  >
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      width="100%"
      style="background-color: #f7f9fb; margin: 0; padding: 0"
    >
      <tr>
        <td align="center" style="padding: 24px 12px 40px 12px">
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="100%"
            style="max-width: 600px; margin: 0 auto; border-collapse: collapse"
          >
            <tr>
              <td
                style="
                  background-color: #0b1622;
                  border-bottom: 3px solid #22c55e;
                  padding: 20px 24px;
                "
              >
                <div
                  style="
                    font-size: 20px;
                    line-height: 1.2;
                    font-weight: 900;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
                    color: #ffffff;
                  "
                >
                  OBRA10<span style="color: #22c55e">+</span>
                </div>
                <div
                  style="
                    margin-top: 6px;
                    font-size: 11px;
                    line-height: 1.4;
                    font-weight: 700;
                    letter-spacing: 0.18em;
                    text-transform: uppercase;
                    color: #c4c6cd;
                  "
                >
                  Convite
                </div>
              </td>
            </tr>
            <tr>
              <td style="background-color: #ffffff; padding: 28px 24px">
                <h1
                  style="
                    margin: 0 0 12px 0;
                    font-size: 20px;
                    line-height: 1.3;
                    font-weight: 900;
                    letter-spacing: 0.02em;
                    text-transform: uppercase;
                    color: #0b1622;
                  "
                >
                  Você foi convidado(a)
                </h1>
                <p
                  style="
                    margin: 0 0 20px 0;
                    font-size: 15px;
                    line-height: 1.55;
                    color: #44474c;
                  "
                >
                  Foi criado um convite para criar uma conta em
                  <a href="{{ .SiteURL }}" style="color: #0b1622; font-weight: 600">{{ .SiteURL }}</a>
                  para o e-mail <span style="color: #191c1e; font-weight: 600">{{ .Email }}</span>.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td align="center" bgcolor="#22c55e">
                      <a
                        href="{{ .ConfirmationURL }}"
                        target="_blank"
                        rel="noopener noreferrer"
                        style="
                          display: inline-block;
                          padding: 14px 22px;
                          font-size: 13px;
                          line-height: 1;
                          font-weight: 800;
                          letter-spacing: 0.12em;
                          text-transform: uppercase;
                          text-decoration: none;
                          color: #0b1622;
                        "
                        >Aceitar convite</a
                      >
                    </td>
                  </tr>
                </table>
                <p
                  style="
                    margin: 20px 0 0 0;
                    font-size: 12px;
                    line-height: 1.55;
                    color: #74777d;
                  "
                >
                  Link alternativo:<br />
                  <a href="{{ .ConfirmationURL }}" style="word-break: break-all; color: #0b1622; font-weight: 600"
                    >{{ .ConfirmationURL }}</a
                  >
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 20px 8px 0 8px">
                <p
                  style="
                    margin: 0;
                    font-size: 11px;
                    line-height: 1.5;
                    color: #74777d;
                    text-align: center;
                  "
                >
                  © Obra10+
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
